{% extends "admin/layout.html" %}
{% block title %}编辑用户 - {{ user.username }}{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h4>编辑用户 <strong>{{ user.display_name }}</strong>（{{ user.username }}）</h4>
        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-sm btn-outline-secondary">← 返回用户列表</a>
    </div>
    <div class="card-body">
        <form id="editUserForm">
            <input type="hidden" name="username" value="{{ user.username }}">

            <div class="mb-3">
                <label for="editDisplayName" class="form-label">显示名称</label>
                <input type="text" class="form-control" id="editDisplayName" name="display_name" value="{{ user.display_name }}" required>
            </div>

            <div class="mb-3">
                <label for="editRole" class="form-label">用户角色</label>
                <select class="form-select" id="editRole" name="role" onchange="toggleNotebookSection()">
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>管理员</option>
                    <option value="team_leader" {% if user.role == 'team_leader' %}selected{% endif %}>团队领导</option>
                    <option value="team_member" {% if user.role == 'team_member' %}selected{% endif %}>团队成员</option>
                </select>
            </div>

            <div class="mb-3" id="notebookSection" style="display: {{ 'none' if user.role == 'admin' else 'block' }};">
                <label for="editAllowedNotebooks" class="form-label">授权笔记本（按住 Ctrl/Cmd 多选）</label>
                <select class="form-select" id="editAllowedNotebooks" name="allowed_notebooks" multiple size="10">
                    {% for nb in available_notebooks %}
                    <option value="{{ nb }}" {% if nb in user.allowed_notebooks %}selected{% endif %}>{{ nb }}</option>
                    {% endfor %}
                </select>
                <div class="form-text">未授权笔记本时，用户只能访问自己创建的笔记。</div>
            </div>

            <div class="mb-3 form-check form-switch">
                <input class="form-check-input" type="checkbox" id="editIsActive" name="is_active" {% if user.is_active %}checked="checked"{% endif %}>
                <label class="form-check-label" for="editIsActive">用户活跃</label>
            </div>

            <button type="submit" class="btn btn-primary">保存修改</button>
        </form>
        <div id="editResult" class="mt-3"></div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // ===== 简易 Markdown 解析器（同上，略）=====
    function simpleMarkdown(text) {
        if (!text) return '';
        let safeText = String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
        return safeText
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.*?)\*/g, '<em>$1</em>')
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
            .replace(/\!\[([^\]]*)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">📷 图片：$1</a>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>')
            .replace(/^/, '<p>')
            .replace(/$/, '</p>')
            .replace(/<p><\/p>/g, '');
    }

    // 绑定“查看详情”按钮
    document.querySelectorAll('.view-session-btn').forEach(btn => {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            const sessionId = this.dataset.sessionId;
            const user = '{{ user.username }}';
            try {
                const resp = await fetch(`/api/admin/user/${encodeURIComponent(user)}/session/${encodeURIComponent(sessionId)}/history?limit=100`);
                const data = await resp.json();
                if (data.success) {
                    let html = '';
                    for (const item of data.history) {
                        // ★★★ 关键修复：时间强制转换为东八区 ★★★
                        const localTime = item.created_at
                            ? new Date(item.created_at).toLocaleString('zh-CN', {
                                timeZone: 'Asia/Shanghai',
                                year: 'numeric', month: '2-digit', day: '2-digit',
                                hour: '2-digit', minute: '2-digit', second: '2-digit',
                                hour12: false
                              })
                            : '时间未知';
                        html += `<div class="mb-2 p-2 border rounded">
                            <strong>问:</strong> ${simpleMarkdown(item.question)}
                            <br>
                            <strong>答:</strong> ${simpleMarkdown(item.answer)}
                            <br>
                            <small class="text-muted">${localTime}</small>
                        </div>`;
                    }
                    document.getElementById('sessionDetailBody').innerHTML = html;
                    new bootstrap.Modal(document.getElementById('sessionDetailModal')).show();
                } else {
                    document.getElementById('sessionDetailBody').innerHTML = '<div class="alert alert-danger">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('sessionDetailBody').innerHTML = '<div class="alert alert-danger">网络错误</div>';
            }
        });
    });
</script>
{% endblock %}
