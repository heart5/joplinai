<!-- 删除确认模态框 -->
<div class="modal fade" id="deleteConfirmModal" tabindex="-1" aria-labelledby="deleteConfirmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="deleteConfirmModalLabel">确认删除</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <p id="deleteConfirmMessage">确定要执行此操作吗？此操作不可撤销。</p>
                <input type="hidden" id="deleteTargetUsername" value="">
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" id="confirmDeleteBtn">确认删除</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 确认删除按钮的点击事件（可根据需要绑定到具体函数）
    document.getElementById('confirmDeleteBtn').addEventListener('click', async function() {
        const username = document.getElementById('deleteTargetUsername').value;
        if (!username) return;

        try {
            const resp = await fetch('/api/admin/user/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username})
            });
            const result = await resp.json();
            if (result.success) {
                showToast('用户已删除', 'success');
                // 关闭模态框
                const modal = bootstrap.Modal.getInstance(document.getElementById('deleteConfirmModal'));
                modal.hide();
                // 刷新用户列表（假设 loadUsers 在父页面已定义）
                if (typeof loadUsers === 'function') loadUsers();
            } else {
                showToast('删除失败: ' + result.error, 'danger');
            }
        } catch (error) {
            showToast('网络错误，删除失败', 'danger');
        }
    });

    // 辅助函数：显示删除确认模态框（给外部调用）
    function showDeleteConfirmModal(username, message) {
        document.getElementById('deleteTargetUsername').value = username;
        document.getElementById('deleteConfirmMessage').textContent = message || '确定要删除用户 ' + username + ' 吗？此操作不可撤销。';
        const modal = new bootstrap.Modal(document.getElementById('deleteConfirmModal'));
        modal.show();
    }
</script>
