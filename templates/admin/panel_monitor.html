{% extends "admin/layout.html" %}
{% block title %}运行面板 · 笔记监测{% endblock %}
{% block content %}
<style>
.heat-cell { width: 14px; height: 14px; border-radius: 2px; display: inline-block; margin: 1px; }
.heat-0 { background-color: #ebedf0; }
.heat-1 { background-color: #9be9a8; }
.heat-2 { background-color: #40c463; }
.heat-3 { background-color: #30a14e; }
.heat-4 { background-color: #216e39; }
.heat-person { font-size: 0.8rem; white-space: nowrap; min-width: 50px; }
.heat-row { display: flex; align-items: center; margin-bottom: 2px; }
.quote-card { border-left: 3px solid #198754; }
.alert-item { font-size: 0.85rem; }
</style>

<div class="d-flex justify-content-between align-items-center mb-3">
    <h4 class="mb-0"><i class="bi bi-grid-3x3-gap-fill"></i> 笔记监测</h4>
    <span class="text-muted small" id="refresh-label"></span>
</div>

<ul class="nav nav-tabs mb-3">
    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.panel_overview') }}">总览</a></li>
    <li class="nav-item"><a class="nav-link active" href="{{ url_for('dashboard.panel_monitor') }}">笔记监测</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.panel_wechat') }}">微信系统</a></li>
    <li class="nav-item"><a class="nav-link" href="{{ url_for('dashboard.panel_system') }}">系统资源</a></li>
</ul>

<div class="row">
    <div class="col-md-8">
        <div class="card mb-3">
            <div class="card-header d-flex justify-content-between align-items-center">
                <span class="fw-bold small">写作热力图（12周）</span>
                <span class="text-muted small" id="heatmap-range"></span>
            </div>
            <div class="card-body py-2" id="heatmap-container" style="overflow-x:auto">
                <div class="text-muted small text-center py-3">加载中...</div>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <!-- 火花摘语 -->
        <div class="card mb-3">
            <div class="card-header fw-bold small">今日火花摘语</div>
            <div class="card-body py-2" id="spark-today">加载中...</div>
        </div>
        <!-- 摘语池 -->
        <div class="card mb-3">
            <div class="card-header fw-bold small">摘语池概览</div>
            <div class="card-body py-2" id="spark-pool">加载中...</div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
function heatClass(wc) {
    if (!wc || wc <= 0) return 'heat-0';
    if (wc < 100) return 'heat-1';
    if (wc < 500) return 'heat-2';
    if (wc < 1000) return 'heat-3';
    return 'heat-4';
}

function renderHeatmap(data) {
    if (!data.data) { document.getElementById('heatmap-container').innerHTML = '<div class="text-danger small text-center py-3">' + (data.error || '无数据') + '</div>'; return; }
    document.getElementById('heatmap-range').textContent = data.start_date + ' ~ ' + data.end_date;
    var dates = data.dates, persons = data.persons, pdata = data.data;
    var html = '<div style="display:inline-block">';
    // header: month labels
    html += '<div class="heat-row"><span class="heat-person"></span>';
    var lastMonth = '';
    var monthHeaders = '';
    for (var i = 0; i < dates.length; i++) {
        var m = dates[i].substring(5, 7);
        if (m !== lastMonth) {
            monthHeaders += '<span style="display:inline-block;width:' + (14 + 2) + 'px;font-size:0.6rem;text-align:left">' + m + '月</span>';
            lastMonth = m;
        } else {
            monthHeaders += '<span style="display:inline-block;width:' + (14 + 2) + 'px"></span>';
        }
    }
    html += monthHeaders + '</div>';
    for (var p = 0; p < persons.length; p++) {
        html += '<div class="heat-row"><span class="heat-person text-muted">' + persons[p] + '</span>';
        for (var d = 0; d < dates.length; d++) {
            var wc = (pdata[persons[p]] || {})[dates[d]] || 0;
            html += '<span class="heat-cell ' + heatClass(wc) + '" title="' + persons[p] + ' ' + dates[d] + ': ' + wc + '字"></span>';
        }
        html += '</div>';
    }
    html += '</div>';
    document.getElementById('heatmap-container').innerHTML = html;
}

function loadMonitor() {
    fetch('{{ url_for("dashboard.api_monitor_heatmap") }}').then(r => r.json()).then(renderHeatmap).catch(console.error);
    fetch('{{ url_for("dashboard.api_status") }}').then(r => r.json()).then(function(data){
        var mon = ((data.tc || {}).monitor || {});
        var q = '';
        if (mon.active_notes != null) q += '<p class="small mb-1">活跃笔记: <b>' + mon.active_notes + '</b> 篇 · ' + (mon.person_count || 0) + ' 人</p>';
        if (mon.last_collect) q += '<p class="small mb-1">最后采集: ' + mon.last_collect.substring(0, 19) + '</p>';
        if (mon.pending_changes != null) q += '<p class="small mb-1">待处理变更: ' + mon.pending_changes + '</p>';
        if (mon.unresolved_alerts != null) q += '<p class="small mb-1">未解决告警: <b class="' + (mon.unresolved_alerts > 0 ? 'text-danger' : '') + '">' + mon.unresolved_alerts + '</b></p>';
        document.getElementById('spark-today').innerHTML = q || '无数据';
        var t = mon.spark_total;
        document.getElementById('spark-pool').innerHTML = t != null ? ('<p class="small mb-1">摘语总数: <b>' + t + '</b></p>') : '无数据';
    }).catch(console.error);
}

loadMonitor();
</script>
{% endblock %}
