{% extends "admin/layout.html" %}
{% block title %}审计日志 - 知识库管理后台{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4>📊 审计日志</h4>
        <div>
            <button class="btn btn-outline-danger btn-sm" onclick="showClearModal()">
                <i class="bi bi-trash"></i> 清理旧日志
            </button>
            <button class="btn btn-outline-success btn-sm" onclick="exportLogs()">
                <i class="bi bi-download"></i> 导出CSV
            </button>
        </div>
    </div>
    <div class="card-body">
        <!-- 筛选条件 -->
        <form id="filterForm" class="row g-2 mb-3">
            <div class="col-md-3">
                <input type="text" class="form-control form-control-sm" id="filterUsername" placeholder="用户名（模糊）">
            </div>
            <div class="col-md-2">
                <select class="form-select form-select-sm" id="filterAction">
                    <option value="">全部操作</option>
                    <!-- 由JS动态加载 -->
                </select>
            </div>
            <div class="col-md-2">
                <input type="date" class="form-control form-control-sm" id="filterStartDate">
            </div>
            <div class="col-md-2">
                <input type="date" class="form-control form-control-sm" id="filterEndDate">
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-primary btn-sm me-2">搜索</button>
                <button type="button" class="btn btn-outline-secondary btn-sm" onclick="resetFilter()">重置</button>
            </div>
        </form>

        <!-- 统计信息 -->
        <div class="mb-2">
            <small class="text-muted">共 <span id="totalCount">0</span> 条记录，当前第 <span id="currentPage">1</span> 页</small>
        </div>

        <!-- 日志表格 -->
        <div class="table-responsive">
            <table class="table table-sm table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>时间</th>
                        <th>用户名</th>
                        <th>显示名</th>
                        <th>操作类型</th>
                        <th>详情</th>
                        <th>IP地址</th>
                    </tr>
                </thead>
                <tbody id="logsTableBody">
                    <tr>
                        <td colspan="7" class="text-center py-4">
                            <div class="spinner-border spinner-border-sm text-primary" role="status">
                                <span class="visually-hidden">加载中...</span>
                            </div>
                            加载中...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <nav>
            <ul class="pagination pagination-sm justify-content-center" id="pagination">
                <!-- 由JS动态渲染 -->
            </ul>
        </nav>
    </div>
</div>

<!-- 清理确认模态框 -->
<div class="modal fade" id="clearModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">清理审计日志</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p>此操作将永久删除指定天数之前的审计日志，不可恢复。</p>
                <div class="mb-3">
                    <label for="clearDays" class="form-label">保留最近天数</label>
                    <input type="number" class="form-control" id="clearDays" value="90" min="7">
                    <div class="form-text">默认保留90天，最少保留7天。</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmClear()">确认清理</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/admin-audit.js') }}"></script>
{% endblock %}
