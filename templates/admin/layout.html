<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}知识库管理后台{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
</head>
<body>
    <!-- 顶部导航 -->
    <nav class="navbar navbar-dark bg-dark px-3">
        <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">📘 知识库管理</a>
        <div class="d-flex">
            <span class="text-light me-3">{{ session.user.display_name }}</span>
            <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm">返回首页</a>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm ms-2">退出</a>
        </div>
    </nav>

    <div class="container-fluid mt-3">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/admin.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
