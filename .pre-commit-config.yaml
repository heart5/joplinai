repos:
  - repo: local
    hooks:
      - id: check-jupytext-comment
        name: 检测 jupytext 误注释的 Flask 端点
        entry: python3 tools/check_jupytext_comment.py
        language: python
        files: \.py$
        always_run: true
        pass_filenames: false
  - repo: https://github.com/PyCQA/flake8
    rev: 7.1.2
    hooks:
      - id: flake8
        args:
          - --max-line-length=100
          - --ignore=E402,W503,E203,E501
          - --exclude=func/
