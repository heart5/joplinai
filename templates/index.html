<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joplin AI 知识问答 - {{ user.display_name }}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 外部自定义 CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- 引入 jQuery (Bootstrap 5 依赖 Popper.js，但 bundle 已包含) -->
    <!-- 引入 Bootstrap JS Bundle (包含 Popper.js) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 外部自定义 JS (将在页面底部 body 结束后引入，见下方说明) -->
</head>
<body>
    <div class="container">
        <h1>🧠 Joplin AI 问答助手</h1>

        <div class="user-info">
            <span>欢迎，{{ user.display_name }} · </span>
            <!-- 新增管理员入口 -->
            {% if user.role == 'admin' %}
            <a href="{{ url_for('admin_dashboard') }}" class="admin-link">用户管理</a>
            <span> · </span>
            {% endif %}
            <a href="{{ url_for('logout') }}">退出登录</a>
        </div>

        <!-- 提问表单 -->
        <form id="askForm">
            <textarea id="questionInput" rows="4" placeholder="请输入您的问题，例如：总结我本周的工作..."></textarea>
            <div style="overflow: hidden;">
                <label style="float:left; margin-top:12px;">
                    <input type="checkbox" id="useHistorySwitch" checked> 使用对话历史
                </label>
                <button type="submit" id="submitBtn">发送提问</button>
            </div>
        </form>
        <div id="loadingIndicator">
            <div class="spinner"></div>
            <p>正在检索知识库并生成答案，请稍候...</p>
        </div>

        <!-- 对话历史 -->
        <div id="chatHistory">
            <div class="bot-message">
                <strong>助手：</strong> 您好！我可以基于您的Joplin笔记库回答问题。请在上方输入您的问题。
            </div>
        </div>

        <!-- 调试信息 -->
        <div class="debug-panel">
            <div class="debug-toggle" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none';">
                🔍 <strong>点击查看答案来源与详情</strong>
            </div>
            <div style="display:none;">
                <h4>参考笔记</h4>
                <ul id="sourcesList">
                    <li><em>等待回答...</em></li>
                </ul>
            </div>
        </div>
    </div>
    <!-- 外部自定义 JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
