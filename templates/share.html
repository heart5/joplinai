<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>轻行动AI - 分享问答</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{{ url_for('static', filename='js/marked.min.js') }}"></script>
    <script src="{{ url_for('static', filename='js/mermaid.min.js') }}"></script>
    <script>mermaid.initialize({ startOnLoad: false, theme: 'default' });</script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <style>
        body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .share-container { max-width: 800px; margin: 40px auto; padding: 0 15px; }
        .share-card { background: white; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); overflow: hidden; }
        .share-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 24px 30px; }
        .share-header h4 { margin: 0 0 8px 0; font-weight: 600; }
        .share-header .meta { font-size: 0.85rem; opacity: 0.85; }
        .share-body { padding: 30px; }
        .share-question { background: #f0f4ff; border-left: 4px solid #667eea; padding: 18px 20px; border-radius: 0 8px 8px 0; margin-bottom: 24px; }
        .share-question .label { font-size: 0.8rem; color: #667eea; font-weight: 600; margin-bottom: 6px; text-transform: uppercase; }
        .share-question .text { font-size: 1.05rem; color: #333; line-height: 1.7; }
        .share-answer { color: #333; line-height: 1.8; }
        .share-answer h1, .share-answer h2, .share-answer h3 { margin-top: 1.2em; margin-bottom: 0.5em; }
        .share-answer p { margin-bottom: 1em; }
        .share-answer ul, .share-answer ol { padding-left: 2em; margin-bottom: 1em; }
        .share-answer code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
        .share-answer pre { background: #2d2d2d; color: #f8f8f2; padding: 15px; border-radius: 6px; overflow-x: auto; }
        .share-answer blockquote { border-left: 4px solid #ddd; padding-left: 1em; color: #666; font-style: italic; }
        .share-footer { border-top: 1px solid #eee; padding: 16px 30px; color: #999; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
        .share-footer .brand { font-weight: 600; color: #667eea; }
        .mermaid-wrapper { position: relative; display: inline-block; max-width: 100%; }
        .mermaid-export-btn { position: absolute; top: 6px; right: 6px; width: 30px; height: 30px; border: 1px solid #ddd; border-radius: 4px; background: rgba(255,255,255,0.92); cursor: pointer; font-size: 14px; line-height: 1; opacity: 0; transition: opacity 0.2s; z-index: 10; padding: 0; color: #666; }
        .mermaid-wrapper:hover .mermaid-export-btn { opacity: 1; }
        .mermaid-export-btn:hover { background: #f0f0f0; color: #333; border-color: #2196F3; }
    </style>
</head>
<body>
<div class="share-container">
    <div class="share-card">
        <div class="share-header">
            <h4>由轻行动AI生成</h4>
            <div class="meta">
                分享时间：{{ record.created_at[:10] }} · 有效期至：{{ record.expires_at[:10] }}
            </div>
        </div>

        <div class="share-body">
            <div class="share-question">
                <div class="label">Q</div>
                <div class="text">{{ record.question }}</div>
            </div>

            <div class="share-answer" id="shareAnswer"></div>
        </div>

        <div class="share-footer">
            <span class="brand">轻行动AI</span>
            <span>基于个人知识库生成</span>
        </div>
    </div>
</div>

<script>
(function() {
    var container = document.getElementById('shareAnswer');
    var rawAnswer = {{ record.answer|tojson }};
    var rendered = window.parseMarkdown
        ? window.parseMarkdown(rawAnswer)
        : rawAnswer.replace(/</g, '&lt;').replace(/>/g, '&gt;');
    container.innerHTML = rendered;

    // 渲染 mermaid 图表 → 挂载导出按钮
    if (container.querySelector('.mermaid')) {
        setTimeout(function() {
            try {
                mermaid.run().then(function() {
                    if (typeof addMermaidExportButtons === 'function') {
                        addMermaidExportButtons();
                    }
                }).catch(function(e) {
                    console.warn('[Share] Mermaid render error:', e);
                });
            } catch(e) { console.warn('[Share] Mermaid sync error:', e); }
        }, 100);
    }
})();
</script>
</body>
</html>
