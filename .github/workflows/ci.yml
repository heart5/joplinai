name: CI

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install flake8
      - run: flake8 . --max-line-length=100 --ignore=E402,W503,E203,E501 --exclude=func/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install pytest
      - run: |
          # Install dependencies from func/ submodule requirements if available
          if [ -f func/requirements.txt ]; then
            pip install -r func/requirements.txt
          fi
      - run: python -m pytest tests/ -v --tb=short
